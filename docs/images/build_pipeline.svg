<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400">
  <defs>
    <marker id="arw" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0,0 7,2.5 0,5" fill="#404040"/>
    </marker>
    <style>
      text { font-family: Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="400" fill="none" rx="0"/>

  <!-- ===== ROW 1: Stages 1–4 ===== -->
  <!-- Stage 1 -->
  <rect x="15" y="30" width="145" height="52" rx="5" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1.4"/>
  <circle cx="34" cy="42" r="8" fill="#4B6A8C"/>
  <text x="34" y="45.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">1</text>
  <text x="92" y="50" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Ingest BAM</text>
  <text x="92" y="68" text-anchor="middle" font-size="7.5" fill="#555">Parse via htslib, FLAG filter</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="56" x2="180" y2="56" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>

  <!-- Stage 2 -->
  <rect x="185" y="30" width="145" height="52" rx="5" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1.4"/>
  <circle cx="204" cy="42" r="8" fill="#4B6A8C"/>
  <text x="204" y="45.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">2</text>
  <text x="262" y="50" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Order Reads</text>
  <text x="262" y="68" text-anchor="middle" font-size="7.5" fill="#555">Deterministic 4-tuple sort</text>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="56" x2="350" y2="56" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>

  <!-- Stage 3 -->
  <rect x="355" y="30" width="145" height="52" rx="5" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1.4"/>
  <circle cx="374" cy="42" r="8" fill="#4B6A8C"/>
  <text x="374" y="45.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">3</text>
  <text x="432" y="50" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Concatenate S</text>
  <text x="432" y="68" text-anchor="middle" font-size="7.5" fill="#555">seq₀ # seq₁ # ··· # seq_{N−1}</text>

  <!-- Arrow 3→4 -->
  <line x1="500" y1="56" x2="520" y2="56" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>

  <!-- Stage 4 (highlighted — critical) -->
  <rect x="525" y="30" width="175" height="52" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
  <circle cx="544" cy="42" r="8" fill="#2563EB"/>
  <text x="544" y="45.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">4</text>
  <text x="618" y="50" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">SA-IS Construction</text>
  <text x="618" y="68" text-anchor="middle" font-size="7.5" fill="#444">Suffix array + BWT in O(|S|)</text>

  <!-- ===== FORK from Stage 4 ===== -->
  <line x1="612" y1="82" x2="612" y2="105" stroke="#404040" stroke-width="1.2"/>
  <!-- Horizontal fork line -->
  <line x1="310" y1="105" x2="612" y2="105" stroke="#404040" stroke-width="1.2"/>
  <!-- Left branch down to 5a -->
  <line x1="310" y1="105" x2="310" y2="122" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>
  <!-- Right branch continues right and down to 5b -->
  <line x1="612" y1="105" x2="612" y2="122" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>

  <!-- Parallel label -->
  <text x="461" y="100" text-anchor="middle" font-size="7.5" fill="#888" font-style="italic">parallel</text>

  <!-- ===== ROW 2: Stages 5a and 5b (parallel) ===== -->
  <!-- Stage 5a -->
  <rect x="195" y="127" width="230" height="52" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
  <circle cx="217" cy="139" r="8" fill="#2563EB"/>
  <text x="217" y="142.5" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">5a</text>
  <text x="325" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Encode S<tspan baseline-shift="sub" font-size="7.5">seq</tspan></text>
  <text x="325" y="166" text-anchor="middle" font-size="7.5" fill="#444">BWT → MTF → RLE → Arithmetic coding</text>

  <!-- Stage 5b -->
  <rect x="495" y="127" width="205" height="52" rx="5" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1.4"/>
  <circle cx="517" cy="139" r="8" fill="#4B6A8C"/>
  <text x="517" y="142.5" text-anchor="middle" font-size="7" font-weight="bold" fill="#fff">5b</text>
  <text x="610" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Build FM-Index</text>
  <text x="610" y="166" text-anchor="middle" font-size="7.5" fill="#555">C array, Occ table, SA samples</text>

  <!-- ===== JOIN from 5a and 5b ===== -->
  <line x1="310" y1="179" x2="310" y2="202" stroke="#404040" stroke-width="1.2"/>
  <line x1="598" y1="179" x2="598" y2="202" stroke="#404040" stroke-width="1.2"/>
  <line x1="310" y1="202" x2="598" y2="202" stroke="#404040" stroke-width="1.2"/>
  <!-- Down from join point -->
  <line x1="454" y1="202" x2="454" y2="218" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>
  <text x="454" y="198" text-anchor="middle" font-size="7.5" fill="#888" font-style="italic">synchronize</text>

  <!-- ===== ROW 3: Stages 6–8 ===== -->
  <!-- Horizontal connector from join to Stage 6 -->
  <line x1="454" y1="218" x2="92" y2="218" stroke="#404040" stroke-width="1.2" stroke-dasharray="none"/>
  <line x1="92" y1="218" x2="92" y2="225" stroke="#404040" stroke-width="1.2"/>

  <!-- Stage 6 -->
  <rect x="15" y="225" width="155" height="52" rx="5" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1.4"/>
  <circle cx="34" cy="237" r="8" fill="#4B6A8C"/>
  <text x="34" y="240.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">6</text>
  <text x="100" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Encode Streams</text>
  <text x="100" y="263" text-anchor="middle" font-size="7.5" fill="#555">S<tspan baseline-shift="sub" font-size="6">qual</tspan>, S<tspan baseline-shift="sub" font-size="6">meta</tspan>, S<tspan baseline-shift="sub" font-size="6">map</tspan></text>

  <!-- Arrow 6→7 -->
  <line x1="170" y1="251" x2="195" y2="251" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>

  <!-- Stage 7 -->
  <rect x="200" y="225" width="150" height="52" rx="5" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1.4"/>
  <circle cx="219" cy="237" r="8" fill="#4B6A8C"/>
  <text x="219" y="240.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">7</text>
  <text x="280" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Window Table</text>
  <text x="280" y="263" text-anchor="middle" font-size="7.5" fill="#555">T = 100,000 characters</text>

  <!-- Arrow 7→8 -->
  <line x1="350" y1="251" x2="375" y2="251" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>

  <!-- Stage 8 -->
  <rect x="380" y="225" width="145" height="52" rx="5" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1.4"/>
  <circle cx="399" cy="237" r="8" fill="#4B6A8C"/>
  <text x="399" y="240.5" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">8</text>
  <text x="458" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Bitvectors</text>
  <text x="458" y="263" text-anchor="middle" font-size="7.5" fill="#555">B<tspan baseline-shift="sub" font-size="6">read</tspan>, B<tspan baseline-shift="sub" font-size="6">window</tspan></text>

  <!-- Arrow 8→9 -->
  <line x1="525" y1="251" x2="545" y2="251" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>

  <!-- Stages 9–10 (highlighted) -->
  <rect x="550" y="225" width="155" height="52" rx="5" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.8"/>
  <circle cx="572" cy="237" r="9" fill="#2563EB"/>
  <text x="572" y="240.5" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#fff">9–10</text>
  <text x="638" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A1A1A">Validate and Seal</text>
  <text x="638" y="263" text-anchor="middle" font-size="7.5" fill="#444">I1–I15 checks, xxHash64</text>

  <!-- ===== OUTPUT ===== -->
  <line x1="627" y1="277" x2="627" y2="310" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>
  <rect x="577" y="315" width="100" height="30" rx="15" fill="#2563EB" stroke="none"/>
  <text x="627" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">.bsi Index</text>

  <!-- ===== INPUT ===== -->
  <line x1="87" y1="10" x2="87" y2="27" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>
  <rect x="47" y="0" width="80" height="14" rx="3" fill="none" stroke="none"/>
  <text x="87" y="9" text-anchor="middle" font-size="8" fill="#888">BAM input</text>

  <!-- ===== LEGEND ===== -->
  <rect x="15" y="365" width="12" height="12" rx="2" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="32" y="375" font-size="7.5" fill="#555">Critical path stages</text>
  <rect x="140" y="365" width="12" height="12" rx="2" fill="#EFF3F8" stroke="#4B6A8C" stroke-width="1"/>
  <text x="157" y="375" font-size="7.5" fill="#555">Supporting stages</text>
  <line x1="280" y1="371" x2="306" y2="371" stroke="#404040" stroke-width="1.2" marker-end="url(#arw)"/>
  <text x="312" y="375" font-size="7.5" fill="#555">Data flow</text>
</svg>
