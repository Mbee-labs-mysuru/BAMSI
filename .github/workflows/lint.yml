name: Lint

on:
  push:
    branches:
      - main
      - story/**
      - feat/**
      - fix/**
      - chore/**
  pull_request:

jobs:
  lint:
    name: lint-linux-x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck

      - name: Configure CMake for compile commands
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=ON

      - name: Verify compile_commands.json exists
        run: test -f build/compile_commands.json

      - name: Run clang-tidy on tracked source files
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.cpp' '*.cc' '*.cxx' | grep -E '^src/' || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No source files found for clang-tidy"
            exit 0
          fi
          clang-tidy \
            -p build \
            "${files[@]}"

      - name: Run cppcheck
        shell: bash
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=invalidLifetime \
            --suppress=truncLongCastAssignment \
            --suppress=redundantInitialization \
            --suppress=unreadVariable \
            --suppress=unusedPrivateFunction \
            --suppress=knownConditionTrueFalse \
            --suppress=useStlAlgorithm \
            --quiet \
            --std=c++20 \
            -I include \
            src include

      - name: Upload compile database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-compile-commands
          path: build/compile_commands.json
          if-no-files-found: ignore
