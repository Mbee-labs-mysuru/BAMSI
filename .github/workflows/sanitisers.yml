name: Sanitisers

on:
  pull_request:
    branches:
      - main
      - release/**
  workflow_dispatch:

jobs:
  asan-ubsan:
    name: asan-ubsan-linux-x86_64
    runs-on: ubuntu-latest

    env:
      BUILD_TYPE: Debug
      CC: clang
      CXX: clang++
      CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
      CXXFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
      LDFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
      ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1:check_initialization_order=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build

      - name: Show toolchain versions
        run: |
          clang --version
          cmake --version
          ninja --version

      - name: Configure CMake with sanitisers
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=${CC} \
            -DCMAKE_CXX_COMPILER=${CXX} \
            -DCMAKE_C_FLAGS="${CFLAGS}" \
            -DCMAKE_CXX_FLAGS="${CXXFLAGS}" \
            -DCMAKE_EXE_LINKER_FLAGS="${LDFLAGS}" \
            -DCMAKE_SHARED_LINKER_FLAGS="${LDFLAGS}"

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Run CTest under ASan and UBSan
        run: |
          ctest --test-dir build \
            --output-on-failure \
            --no-tests=error

      - name: Upload sanitizer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitisers-linux-x86_64
          path: |
            build/Testing/**/*
            build/**/*.log
          if-no-files-found: ignore
